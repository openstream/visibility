# Vorlage für eine Kunden-Konfiguration. Pro Kunde eine Datei: <slug>.yaml
# Keywords & GEO-Prompts werden beim Onboarding generiert und vom Kunden freigegeben
# (siehe README → "Keyword- & GEO-Prompt-Generierung"). status: approved erst nach Freigabe.

slug: musterkunde
name: Muster AG
domain: musterkunde.ch

# Sprach-/Regionskontext für lokalisierte Rankings & GEO-Prompts (CH!)
locale:
  country: Switzerland
  gl: ch
  languages: [de]        # ggf. [de, fr, it] bei mehrsprachigen Seiten
  region: null           # z.B. "Zürich" / Kanton, wenn lokaler Fokus

report:
  recipient: kunde@musterkunde.ch
  # Empfänger der monatlichen Mail (Draft geht an Nick zur Freigabe).

# Social-Media-Kanäle (EIGENE Accounts des Kunden). `collect --social`.
# YouTube: Kanal-ID (UC...), URL oder @handle. TikTok/Instagram: @handle oder URL.
# Leer lassen, wenn nicht vorhanden → Report blendet den Kanal aus.
# Tipp: Das Handle möglichst VOR dem ersten `collect --social` eintragen — es dient als
# Kanal-Label; ändert es sich nachträglich, entsteht eine zweite Zeile statt eines Updates.
social:
  youtube: []
  tiktok: []
  instagram: []

# Newsletter (Owned Media). provider: sendy | mailchimp. env_suffix = Slug GROSSBUCHSTABEN
# → SENDY_API_KEY_<SUFFIX>/SENDY_URL_<SUFFIX> bzw. MAILCHIMP_API_KEY_<SUFFIX> aus .env.
# Weglassen, wenn der Kunde keinen Newsletter hat.
# newsletter:
#   provider: mailchimp
#   env_suffix: MUSTERKUNDE

competitors:
  - konkurrent-eins.ch
  - konkurrent-zwei.ch

# --- Wird beim Onboarding befüllt; hier nur die Struktur ---
keywords:
  approved: false        # true erst nach Kundenfreigabe
  approved_at: null
  list: []
  # - "beispiel dienstleistung zürich"

geo_prompts:
  approved: false
  approved_at: null
  # type: category (Wettbewerb) | brand (Marken-Wissen)
  list: []
  # - { type: category, text: "Bester Anbieter für <Leistung> in der Region Zürich?" }
  # - { type: brand,    text: "Was ist die Muster AG und was bietet sie an?" }
