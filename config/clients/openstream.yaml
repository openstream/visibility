# Erste echte Domain — openstream.ch (Nicks eigene Domain, GSC-Zugriff vorhanden).
# Keywords & GEO-Prompts werden beim Onboarding (Phase 1.5) generiert und hier befüllt.

slug: openstream
name: Openstream
domain: openstream.ch

locale:
  country: Switzerland
  gl: ch
  languages: [de]
  region: null

# Google Search Console — SA-Zugriff eingerichtet (read-only).
# Achtung: als URL-Prefix-Property angebunden, nicht als Domain-Property.
# Alle Varianten (non-www, http) leiten auf https://www.openstream.ch/ → volle Abdeckung.
gsc:
  property_type: url_prefix
  site_url: "https://www.openstream.ch/"
  verified: true

# Bing Webmaster Tools — Property verifiziert (klassische Rankings via API).
# Der Bing "AI Performance"-Report hat noch keine API → separat/manuell (später).
bing:
  site_url: "https://www.openstream.ch/"
  verified: true

# GEO-Kanäle (KI-Sichtbarkeit). Aktiv = werden bei `collect --geo` erhoben.
# Kosten-bewusst: ChatGPT (wichtigster, 72 % CH) + Perplexity (citation-native, günstig).
# gemini/claude sind bereit, aber deaktiviert (bei Bedarf auf true) — sie sind teurer.
# Rhythmus: GEO monatlich (KI-Antworten ändern sich langsam); Rankings bleiben wöchentlich.
geo:
  channels:
    chatgpt:     true
    perplexity:  true
    gemini:      false
    claude:      false
    ai_overview: true   # Google AI Overviews (via DataForSEO SERP, prüft die Keywords)

# Social-Media-Kanäle (EIGENE Accounts des Kunden). Werden bei `collect --social` erhoben.
# YouTube: Kanal-ID (UC...), Kanal-URL oder @handle. TikTok/Instagram: @handle oder Profil-URL.
# Leer lassen, wenn ein Kunde einen Kanal nicht hat — der Report blendet ihn dann aus.
social:
  youtube: []      # z.B. ["@openstream"] oder ["UCxxxxxxxxxxxxxxxxxxxxxx"]
  tiktok: []
  instagram: []

# Newsletter (Owned Media). provider: sendy | mailchimp. env_suffix = Slug in GROSSBUCHSTABEN
# → Keys SENDY_API_KEY_<SUFFIX>/SENDY_URL_<SUFFIX> bzw. MAILCHIMP_API_KEY_<SUFFIX> aus .env.
newsletter:
  provider: sendy
  env_suffix: OPENSTREAM
  list_id: ""        # Sendy-Listen-ID (für aktive Abonnenten-Zahl); beim Setup eintragen

report:
  recipient: nick@openstream.ch

# Wichtige Seiten fürs Website-Verständnis (Onboarding Schritt 0). Ergänzen die
# Startseite, damit das Profil auch die Kernbereiche erfasst — nicht nur die Homepage.
# Die Plattform-Seiten sollen openstream als Experten für diese Systeme etablieren.
key_pages:
  - "https://www.openstream.ch/"
  - "https://www.openstream.ch/wordpress"
  - "https://www.openstream.ch/woocommerce"
  - "https://www.openstream.ch/shopify"
  - "https://www.openstream.ch/magento/"
  - "https://www.openstream.ch/blog/"
  - "https://www.openstream.ch/vlog/"      # neuer Kurzvideo-Kanal zu den Blog-Themen

# Plattform-Keyword-Kombinationen (deterministisch generiert beim Onboarding).
# Etabliert openstream als Experten für diese Plattformen — einzeln UND in
# Kombination mit Rolle (Agentur/Dienstleister/…) und Region (Schweiz/Zürich).
# Muster: Plattform pur, +Rolle, +Rolle+Region, +Region.
keyword_combinations:
  platforms:
    - wordpress
    - woocommerce
    - shopify
    - magento
  roles:
    - agentur
    - dienstleister
    - entwicklung
    - erstellen lassen
    - migration
  regions:
    - schweiz
    - zürich

competitors: []          # beim Onboarding aus SERP/Wissen ergänzen

keywords:
  approved: false
  approved_at: null
  list: []

geo_prompts:
  approved: false
  approved_at: null
  list: []
